name: Release

# Push a v* tag (e.g. v0.0.6) to build the extension and attach the packaged
# .vsix to a GitHub Release. No Marketplace publish — install the .vsix by hand
# (code --install-extension octo-agent-<version>.vsix).
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # needed to create the Release and upload the .vsix asset

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            webview/package-lock.json

      # webview is a separate package with its own lockfile; the extension's
      # vscode:prepublish builds it, so its deps must be installed too.
      - run: npm ci
      - run: npm ci --prefix webview

      - run: npm run typecheck
      - run: npm test

      # vsce package runs vscode:prepublish (esbuild --production + webview
      # build), producing octo-agent-<version>.vsix in the repo root.
      - run: npm run package

      - uses: softprops/action-gh-release@v3
        with:
          files: '*.vsix'
